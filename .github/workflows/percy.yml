name: Percy visual

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  CYPRESS_DEMO_PASSWORD: ${{ secrets.DEMO_PASSWORD }}
  CYPRESS_ENV: ci

jobs:
  visual:
    name: Percy — visual regression
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      testflow:
        image: qaschool/testflow:latest
        ports:
          - 5050:5050
        options: >-
          --health-interval 15s
          --health-timeout 10s
          --health-retries 6
          --health-start-period 90s
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Cache Cypress binary
        uses: actions/cache@v5
        with:
          path: ~/.cache/Cypress
          key: cypress-bin-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Wait for TestFlow
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5050/health >/dev/null; then
              echo "TestFlow is ready"
              exit 0
            fi
            sleep 4
          done
          echo "TestFlow did not become ready in time"
          exit 1

      - name: Run Percy visual tests
        run: npm run cy:run:visual:percy
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
